<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Emergency Help Pro+</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    color: white;
}
.container {
    margin-top: 50px;
}
input, button {
    padding: 10px;
    margin: 8px;
    width: 250px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔐 Login / Signup</h2>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<hr>

<h2>🚨 Emergency</h2>
<input type="text" id="name" placeholder="Your Name"><br>
<input type="tel" id="phone" placeholder="Contact Number"><br>

<button onclick="sendAlert()">Send Alert</button>

<p id="status"></p>

</div>

<script>
// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// SIGNUP
function signup() {
    const email = emailInput();
    const pass = passInput();

    auth.createUserWithEmailAndPassword(email, pass)
    .then(() => alert("Signup Success"))
    .catch(e => alert(e.message));
}

// LOGIN
function login() {
    const email = emailInput();
    const pass = passInput();

    auth.signInWithEmailAndPassword(email, pass)
    .then(() => alert("Login Success"))
    .catch(e => alert(e.message));
}

// SEND ALERT + SAVE DATA
function sendAlert() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;

    navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        // Save to database
        db.collection("alerts").add({
            name: name,
            phone: phone,
            location: lat + "," + lon,
            time: new Date()
        });

        // WhatsApp
        let msg = `🚨 EMERGENCY 🚨
Name: ${name}
Location: https://maps.google.com/?q=${lat},${lon}`;

        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);

        document.getElementById("status").innerHTML = "✅ Alert Sent & Saved!";
    });
}

function emailInput() {
    return document.getElementById("email").value;
}
function passInput() {
    return document.getElementById("password").value;
}
</script>

</body>
</html>
